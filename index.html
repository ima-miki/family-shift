<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4a90d9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家族見守りシフト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8f4fd;
    --surface: #ffffff;
    --surface2: #f0f8ff;
    --accent: #ff6b6b;
    --blue: #4a90d9;
    --teal: #2196a8;
    --yellow: #ff9500;
    --text: #1a3a4a;
    --text-muted: #6a8fa0;
    --border: rgba(74,144,217,0.15);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══ ログイン画面 ══ */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.9) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(174,214,241,0.7) 0%, transparent 45%),
      linear-gradient(180deg, #b8dff7 0%, #daeefb 40%, #eef8fd 100%);
    position: relative; overflow: hidden;
  }
  #loginScreen::before, #loginScreen::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.75);
    border-radius: 50px; filter: blur(2px);
  }
  #loginScreen::before {
    width: 180px; height: 60px; top: 12%; left: 5%;
    box-shadow: 40px -15px 0 20px rgba(255,255,255,0.6), 80px 5px 0 10px rgba(255,255,255,0.5);
  }
  #loginScreen::after {
    width: 120px; height: 45px; top: 20%; right: 8%;
    box-shadow: 30px -10px 0 15px rgba(255,255,255,0.6);
  }

  .login-card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 8px 40px rgba(74,144,217,0.15);
    position: relative; z-index: 1;
    width: 100%; max-width: 360px;
  }

  .login-logo { font-size: 3rem; margin-bottom: 0.8rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .login-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; color: #1a3a4a; }
  .login-sub { color: #6a8fa0; font-size: 0.88rem; margin-bottom: 1.8rem; line-height: 1.6; }

  .btn-google {
    display: flex; align-items: center; gap: 0.8rem;
    background: #4a90d9; color: white; border: none;
    padding: 0.9rem 2rem; border-radius: 50px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 16px rgba(74,144,217,0.35);
    margin: 0 auto;
  }
  .btn-google:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,144,217,0.45); background: #3a7fc9; }
  .btn-google img { width: 22px; filter: brightness(10); }

  /* ══ グループ選択画面 ══ */
  #groupScreen { display: none; flex-direction: column; min-height: 100vh; }

  .group-header {
    background: rgba(255,255,255,0.9);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 12px rgba(74,144,217,0.08);
  }

  .group-main {
    flex: 1; padding: 1.5rem 1.2rem;
    max-width: 480px; margin: 0 auto; width: 100%;
  }

  .group-section { margin-bottom: 1.8rem; }
  .group-section-title {
    font-size: 0.78rem; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 0.8rem;
  }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #4a90d9, #2196a8);
    color: white; border: none; border-radius: 10px;
    padding: 0.85rem; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(74,144,217,0.3);
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    width: 100%;
    background: white; color: var(--blue);
    border: 2px solid var(--blue); border-radius: 10px;
    padding: 0.85rem; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { background: #f0f8ff; }

  .input-row { display: flex; gap: 0.6rem; margin-bottom: 0.6rem; }
  .input-row input { flex: 1; }

  .group-list { display: flex; flex-direction: column; gap: 0.6rem; }

  .group-item {
    background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 1px 8px rgba(74,144,217,0.06);
  }
  .group-item:hover { border-color: var(--blue); box-shadow: 0 4px 16px rgba(74,144,217,0.12); }
  .group-item-name { font-weight: 700; font-size: 1rem; }
  .group-item-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.2rem; }
  .group-item-arrow { color: var(--blue); font-size: 1.2rem; }

  /* ══ アプリ本体 ══ */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  header {
    background: rgba(255,255,255,0.9);
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 12px rgba(74,144,217,0.08);
  }

  .header-left { display: flex; align-items: center; gap: 0.6rem; }
  .header-group { font-weight: 700; font-size: 1rem; }
  .header-user { font-size: 0.72rem; color: var(--text-muted); }
  .header-right { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end; }

  .btn-icon {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 0.4rem 0.7rem;
    border-radius: 20px; font-size: 0.78rem; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .btn-icon:hover { border-color: var(--blue); color: var(--blue); }

  main {
    flex: 1; padding: 1.2rem;
    max-width: 600px; margin: 0 auto; width: 100%;
    background: linear-gradient(180deg, #e8f4fd 0%, #f5fbff 100%);
    min-height: calc(100vh - 60px);
  }

  /* 招待コードバナー */
  .invite-banner {
    background: linear-gradient(135deg, #e8f4fd, #d0eaf9);
    border: 1px solid rgba(74,144,217,0.2);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    margin-bottom: 1.2rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem;
  }
  .invite-label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.2rem; }
  .invite-code {
    font-family: 'DM Mono', monospace;
    font-size: 1.6rem; font-weight: 700;
    color: var(--blue); letter-spacing: 0.15em;
  }
  .btn-copy {
    background: white; border: 1px solid var(--border);
    border-radius: 8px; padding: 0.5rem 0.8rem;
    font-size: 0.8rem; cursor: pointer; white-space: nowrap;
    color: var(--blue); font-weight: 600;
    transition: all 0.2s; flex-shrink: 0;
  }
  .btn-copy:hover { background: var(--blue); color: white; }

  /* フォームカード */
  .card {
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem; margin-bottom: 1.2rem;
    box-shadow: 0 2px 16px rgba(74,144,217,0.08);
  }
  .card-title {
    font-size: 0.78rem; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 1rem;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.78rem; color: var(--text-muted); }

  input, select, textarea {
    background: #f0f8ff; border: 1px solid rgba(74,144,217,0.2);
    border-radius: 8px; color: var(--text);
    padding: 0.6rem 0.8rem; font-size: 0.9rem;
    font-family: inherit; transition: all 0.2s; width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #4a90d9;
    background: white; box-shadow: 0 0 0 3px rgba(74,144,217,0.1);
  }
  select option { background: white; color: var(--text); }
  textarea { resize: vertical; min-height: 60px; }

  .btn-add {
    width: 100%;
    background: linear-gradient(135deg, #4a90d9, #2196a8);
    color: white; border: none; border-radius: 8px;
    padding: 0.75rem; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-top: 0.4rem;
    box-shadow: 0 4px 14px rgba(74,144,217,0.3);
  }
  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* 週ナビ */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .week-label { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text-muted); }
  .btn-nav {
    background: rgba(255,255,255,0.9); border: 1px solid rgba(74,144,217,0.2);
    color: #4a90d9; padding: 0.4rem 0.8rem; border-radius: 8px;
    cursor: pointer; font-size: 0.85rem; font-weight: 600;
    transition: all 0.2s;
  }
  .btn-nav:hover { background: #4a90d9; color: white; border-color: #4a90d9; }

  /* シフト一覧 */
  .day-block { margin-bottom: 1rem; }
  .day-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .day-name { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text-muted); text-transform: uppercase; }
  .day-date { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }
  .today-badge { background: #ff6b6b; color: white; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 700; }

  .shift-item {
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(74,144,217,0.12);
    border-left: 4px solid #4a90d9;
    border-radius: var(--radius); padding: 0.8rem 1rem;
    margin-bottom: 0.5rem; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 0.8rem;
    animation: slideIn 0.25s ease;
    box-shadow: 0 1px 8px rgba(74,144,217,0.07);
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .shift-item.mine { border-left-color: #ff9500; }

  .shift-info { flex: 1; }
  .shift-member { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.2rem; }
  .shift-time { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: #4a90d9; font-weight: 600; }
  .shift-item.mine .shift-time { color: #ff9500; }
  .shift-note { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; }

  .btn-delete {
    background: transparent; border: none; color: #ccc;
    cursor: pointer; font-size: 1rem; padding: 0.2rem;
    transition: color 0.2s; flex-shrink: 0;
  }
  .btn-delete:hover { color: #ff6b6b; }

  .empty-day { font-size: 0.8rem; color: #aac8dc; padding: 0.5rem 0; font-style: italic; }
  .loading { display: flex; justify-content: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem; }

  /* トースト */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: white; border: 1px solid #4a90d9; color: #4a90d9;
    padding: 0.7rem 1.5rem; border-radius: 50px;
    font-size: 0.85rem; font-weight: 600; z-index: 999;
    transition: transform 0.3s ease; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(74,144,217,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: #ff6b6b; color: #ff6b6b; }

  .err-msg {
    display: none; background: rgba(255,107,107,0.1);
    border: 1px solid #ff6b6b; color: #e05555;
    padding: 0.8rem 1rem; border-radius: 8px;
    font-size: 0.85rem; margin-top: 0.8rem;
  }

  .divider {
    text-align: center; color: var(--text-muted);
    font-size: 0.8rem; margin: 1rem 0;
    display: flex; align-items: center; gap: 0.8rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(74,144,217,0.15);
  }
</style>
</head>
<body>

<!-- ══ ① ログイン画面 ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🏠</div>
    <div class="login-title">家族見守りシフト</div>
    <div class="login-sub">家族みんなでシフトを共有して<br>見守り体制をつくりましょう</div>
    <button class="btn-google" id="loginBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Googleでログイン
    </button>
    <div class="err-msg" id="loginError"></div>
  </div>
</div>

<!-- ══ ② グループ選択画面 ══ -->
<div id="groupScreen">
  <div class="group-header">
    <div>
      <div style="font-weight:700">グループを選ぶ</div>
      <div style="font-size:0.75rem;color:var(--text-muted)" id="groupHeaderUser"></div>
    </div>
    <button class="btn-icon" id="groupLogoutBtn">ログアウト</button>
  </div>

  <div class="group-main">

    <div class="group-section">
      <div class="group-section-title">参加中のグループ</div>
      <div id="myGroupList"><div class="loading">読み込み中…</div></div>
    </div>

    <div class="divider">または</div>

    <div class="group-section">
      <div class="group-section-title">新しいグループを作る</div>
      <div class="form-group" style="margin-bottom:0.6rem">
        <label>グループ名（例：田中家の見守り）</label>
        <input type="text" id="newGroupName" placeholder="グループ名を入力" maxlength="30">
      </div>
      <button class="btn-primary" id="createGroupBtn">＋ グループを作成</button>
    </div>

    <div class="divider">または</div>

    <div class="group-section">
      <div class="group-section-title">招待コードで参加する</div>
      <div class="input-row">
        <input type="text" id="inviteCodeInput" placeholder="招待コード（6桁）" maxlength="6"
          style="text-transform:uppercase;letter-spacing:0.15em;font-family:'DM Mono',monospace;font-size:1.1rem">
        <button class="btn-secondary" id="joinGroupBtn" style="width:auto;padding:0 1.2rem">参加</button>
      </div>
      <div class="err-msg" id="joinError"></div>
    </div>

  </div>
</div>

<!-- ══ ③ アプリ本体 ══ -->
<div id="app">
  <header>
    <div class="header-left">
      <span>🏠</span>
      <div>
        <div class="header-group" id="headerGroupName"></div>
        <div class="header-user" id="headerUser"></div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="inviteBtn">招待コード</button>
      <button class="btn-icon" id="changeGroupBtn">グループ変更</button>
      <button class="btn-icon" id="logoutBtn">ログアウト</button>
    </div>
  </header>

  <main>
    <div class="invite-banner" id="inviteBanner" style="display:none">
      <div>
        <div class="invite-label">📨 このコードを家族に教えてください</div>
        <div class="invite-code" id="inviteCodeDisplay"></div>
      </div>
      <button class="btn-copy" id="copyCodeBtn">コピー</button>
    </div>

    <div class="card">
      <div class="card-title">シフトを追加</div>
      <div class="form-row">
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="shiftDate">
        </div>
        <div class="form-group">
          <label>担当者名</label>
          <input type="text" id="shiftMember" placeholder="例：お父さん" maxlength="20">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>開始時刻</label>
          <input type="time" id="shiftStart">
        </div>
        <div class="form-group">
          <label>終了時刻</label>
          <input type="time" id="shiftEnd">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>メモ（任意）</label>
          <textarea id="shiftNote" placeholder="例：病院の送り迎えあり"></textarea>
        </div>
      </div>
      <button class="btn-add" id="addBtn">＋ シフトを追加</button>
    </div>

    <div class="week-nav">
      <button class="btn-nav" id="prevWeek">← 前週</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="btn-nav" id="nextWeek">次週 →</button>
    </div>

    <div id="shiftList"><div class="loading">読み込み中…</div></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, getDocs,
  query, where, orderBy, onSnapshot, serverTimestamp, updateDoc, arrayUnion }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══════════════════════════════════════════
//  ★ ここにFirebaseの設定を貼り付けてください ★
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCtuu6B55AXqi6mahgy-9hOJ_3GnD34d5Y",
  authDomain: "family-shift.firebaseapp.com",
  projectId: "family-shift",
  storageBucket: "family-shift.firebasestorage.app",
  messagingSenderId: "785544071536",
  appId: "1:785544071536:web:05eb927602ce523bd427b5"
};
// ══════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentGroup = null;
let weekOffset = 0;
let unsubShifts = null;
let unsubGroups = null;

// ── 画面切り替え ──────────────────────────
const screens = {
  login: document.getElementById('loginScreen'),
  group: document.getElementById('groupScreen'),
  app:   document.getElementById('app'),
};
function showScreen(name) {
  Object.entries(screens).forEach(([k, el]) => {
    el.style.display = k === name ? 'flex' : 'none';
    if (k === name) el.style.flexDirection = 'column';
  });
}

// ── トースト ──────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2800);
}

// ── 招待コード生成 ────────────────────────
function generateCode() {
  return Math.random().toString(36).substring(2, 8).toUpperCase();
}

// ── 週ユーティリティ ──────────────────────
function getWeekDates(offset = 0) {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - today.getDay() + 1 + offset * 7);
  monday.setHours(0,0,0,0);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}
const dateStr = d => d.toISOString().slice(0, 10);
const DAY_NAMES = ['月','火','水','木','金','土','日'];
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══ 認証 ═════════════════════════════════
document.getElementById('loginBtn').onclick = async () => {
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch(e) {
    errEl.textContent = 'ログインに失敗しました: ' + e.message;
    errEl.style.display = 'block';
  }
};

const doLogout = async () => {
  if (unsubShifts) { unsubShifts(); unsubShifts = null; }
  if (unsubGroups) { unsubGroups(); unsubGroups = null; }
  currentGroup = null;
  await signOut(auth);
};
document.getElementById('groupLogoutBtn').onclick = doLogout;
document.getElementById('logoutBtn').onclick = doLogout;

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('groupHeaderUser').textContent = user.displayName || user.email;
    showScreen('group');
    loadMyGroups();
  } else {
    showScreen('login');
  }
});

// ══ グループ管理 ══════════════════════════

function loadMyGroups() {
  if (unsubGroups) unsubGroups();
  const q = query(collection(db, 'groups'), where('members', 'array-contains', currentUser.uid));
  unsubGroups = onSnapshot(q, snap => {
    const groups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderGroupList(groups);
  });
}

function renderGroupList(groups) {
  const el = document.getElementById('myGroupList');
  if (groups.length === 0) {
    el.innerHTML = '<div style="font-size:0.85rem;color:var(--text-muted);padding:0.5rem 0">まだグループがありません。作るか、招待コードで参加してください 😊</div>';
    return;
  }
  el.innerHTML = '';
  groups.forEach(g => {
    const item = document.createElement('div');
    item.className = 'group-item';
    item.innerHTML = `
      <div>
        <div class="group-item-name">🏠 ${escHtml(g.name)}</div>
        <div class="group-item-meta">招待コード: <b>${g.inviteCode}</b> ／ メンバー ${g.members.length}人</div>
      </div>
      <div class="group-item-arrow">›</div>
    `;
    item.onclick = () => enterGroup(g);
    el.appendChild(item);
  });
}

// グループ作成
document.getElementById('createGroupBtn').onclick = async () => {
  const name = document.getElementById('newGroupName').value.trim();
  if (!name) { showToast('グループ名を入力してください', true); return; }

  const btn = document.getElementById('createGroupBtn');
  btn.disabled = true; btn.textContent = '作成中…';
  try {
    const inviteCode = generateCode();
    const ref = await addDoc(collection(db, 'groups'), {
      name, inviteCode,
      ownerId: currentUser.uid,
      members: [currentUser.uid],
      createdAt: serverTimestamp()
    });
    document.getElementById('newGroupName').value = '';
    showToast(`「${name}」を作成しました！`);
    enterGroup({ id: ref.id, name, inviteCode, members: [currentUser.uid] });
  } catch(e) {
    console.error(e);
    showToast('作成に失敗しました', true);
  } finally {
    btn.disabled = false; btn.textContent = '＋ グループを作成';
  }
};

// 招待コードで参加
document.getElementById('joinGroupBtn').onclick = async () => {
  const code = document.getElementById('inviteCodeInput').value.trim().toUpperCase();
  const errEl = document.getElementById('joinError');
  errEl.style.display = 'none';

  if (code.length !== 6) {
    errEl.textContent = '招待コードは6桁です';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('joinGroupBtn');
  btn.disabled = true; btn.textContent = '参加中…';
  try {
    const snap = await getDocs(query(collection(db, 'groups'), where('inviteCode', '==', code)));
    if (snap.empty) {
      errEl.textContent = '招待コードが見つかりません。もう一度確認してください。';
      errEl.style.display = 'block';
      return;
    }
    const groupDoc = snap.docs[0];
    const groupData = { id: groupDoc.id, ...groupDoc.data() };

    if (groupData.members.includes(currentUser.uid)) {
      showToast('すでに参加しています');
      enterGroup(groupData);
      return;
    }

    await updateDoc(doc(db, 'groups', groupDoc.id), { members: arrayUnion(currentUser.uid) });
    document.getElementById('inviteCodeInput').value = '';
    showToast(`「${groupData.name}」に参加しました！`);
    groupData.members.push(currentUser.uid);
    enterGroup(groupData);
  } catch(e) {
    console.error(e);
    errEl.textContent = '参加に失敗しました: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '参加';
  }
};

// グループに入る
function enterGroup(group) {
  currentGroup = group;
  if (unsubGroups) { unsubGroups(); unsubGroups = null; }
  document.getElementById('headerGroupName').textContent = group.name;
  document.getElementById('headerUser').textContent = currentUser.displayName || currentUser.email;
  document.getElementById('shiftDate').value = dateStr(new Date());
  document.getElementById('inviteBanner').style.display = 'none';
  weekOffset = 0;
  showScreen('app');
  updateWeekLabel();
  loadShifts();
}

document.getElementById('changeGroupBtn').onclick = () => {
  if (unsubShifts) { unsubShifts(); unsubShifts = null; }
  currentGroup = null;
  showScreen('group');
  loadMyGroups();
};

// ══ 招待コード表示 ════════════════════════
document.getElementById('inviteBtn').onclick = () => {
  const banner = document.getElementById('inviteBanner');
  const isVisible = banner.style.display !== 'none';
  banner.style.display = isVisible ? 'none' : 'flex';
  document.getElementById('inviteCodeDisplay').textContent = currentGroup.inviteCode;
};

document.getElementById('copyCodeBtn').onclick = () => {
  navigator.clipboard.writeText(currentGroup.inviteCode)
    .then(() => showToast('コードをコピーしました！'))
    .catch(() => showToast('コピーできませんでした', true));
};

// ══ 週ナビ ════════════════════════════════
function updateWeekLabel() {
  const days = getWeekDates(weekOffset);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('weekLabel').textContent = `${fmt(days[0])} 〜 ${fmt(days[6])}`;
}
document.getElementById('prevWeek').onclick = () => { weekOffset--; updateWeekLabel(); loadShifts(); };
document.getElementById('nextWeek').onclick = () => { weekOffset++; updateWeekLabel(); loadShifts(); };

// ══ シフト ════════════════════════════════
function loadShifts() {
  if (unsubShifts) unsubShifts();
  if (!currentGroup) return;
  const days = getWeekDates(weekOffset);
  const q = query(
    collection(db, 'shifts'),
    where('groupId', '==', currentGroup.id),
    where('date', '>=', dateStr(days[0])),
    where('date', '<=', dateStr(days[6])),
    orderBy('date'), orderBy('startTime')
  );
  unsubShifts = onSnapshot(q, snap => {
    renderShifts(snap.docs.map(d => ({ id: d.id, ...d.data() })), getWeekDates(weekOffset));
  }, err => { console.error(err); showToast('読み込みエラー', true); });
}

function renderShifts(shifts, days) {
  const today = dateStr(new Date());
  const list = document.getElementById('shiftList');
  list.innerHTML = '';
  days.forEach((day, i) => {
    const ds = dateStr(day);
    const dayShifts = shifts.filter(s => s.date === ds);
    const block = document.createElement('div');
    block.className = 'day-block';
    block.innerHTML = `
      <div class="day-header">
        <span class="day-name">${DAY_NAMES[i]}曜</span>
        <span class="day-date">${day.getMonth()+1}/${day.getDate()}</span>
        ${ds === today ? '<span class="today-badge">TODAY</span>' : ''}
      </div>
    `;
    if (dayShifts.length === 0) {
      block.innerHTML += '<div class="empty-day">担当者なし</div>';
    } else {
      dayShifts.forEach(shift => {
        const isMine = shift.userId === currentUser.uid;
        const item = document.createElement('div');
        item.className = 'shift-item' + (isMine ? ' mine' : '');
        item.innerHTML = `
          <div class="shift-info">
            <div class="shift-member">${escHtml(shift.member)}</div>
            <div class="shift-time">${shift.startTime} 〜 ${shift.endTime}</div>
            ${shift.note ? `<div class="shift-note">${escHtml(shift.note)}</div>` : ''}
          </div>
          ${isMine ? `<button class="btn-delete" data-id="${shift.id}">✕</button>` : ''}
        `;
        block.appendChild(item);
      });
    }
    list.appendChild(block);
  });
  list.querySelectorAll('.btn-delete').forEach(btn => {
    btn.onclick = () => deleteShift(btn.dataset.id);
  });
}

document.getElementById('addBtn').onclick = async () => {
  if (!currentUser || !currentGroup) return;
  const date   = document.getElementById('shiftDate').value;
  const member = document.getElementById('shiftMember').value.trim();
  const start  = document.getElementById('shiftStart').value;
  const end    = document.getElementById('shiftEnd').value;
  const note   = document.getElementById('shiftNote').value.trim();
  if (!date || !member || !start || !end) { showToast('日付・担当者・時刻は必須です', true); return; }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = '追加中…';
  try {
    await addDoc(collection(db, 'shifts'), {
      groupId: currentGroup.id,
      date, member, startTime: start, endTime: end, note,
      userId: currentUser.uid,
      userName: currentUser.displayName || currentUser.email,
      createdAt: serverTimestamp()
    });
    document.getElementById('shiftMember').value = '';
    document.getElementById('shiftStart').value = '';
    document.getElementById('shiftEnd').value = '';
    document.getElementById('shiftNote').value = '';
    showToast('シフトを追加しました ✓');
  } catch(e) {
    console.error(e); showToast('追加に失敗しました', true);
  } finally {
    btn.disabled = false; btn.textContent = '＋ シフトを追加';
  }
};

async function deleteShift(id) {
  if (!confirm('このシフトを削除しますか？')) return;
  try {
    await deleteDoc(doc(db, 'shifts', id));
    showToast('削除しました');
  } catch(e) {
    console.error(e); showToast('削除に失敗しました', true);
  }
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js')
    .catch(e => console.warn('SW登録失敗:', e));
}
</script>
